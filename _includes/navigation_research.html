<header id="header">
  <div class="header-inner">
    <a class="site-name" href="/research/bio.html">Romain Tavenard</a>
    <span class="site-role">Professor · Université de Rennes 2 / IRISA-MALT</span>
    <nav class="primary-nav">
      {% for item in site.data.navigation_research %}
        {% assign slice_sz = page.url | size %}
        {% assign slice_str = item.link | slice: 0, slice_sz %}
        <a href="{{ item.link }}"{% if page.url == slice_str %} class="active"{% endif %}>{{ item.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
